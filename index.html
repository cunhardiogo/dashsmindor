<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindor · Relatórios</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FE5000;
  --bg:#F8F7F5;
  --surface:#fff;
  --border:#E8E8E5;
  --text:#0F0F0E;
  --muted:#6B7280;
  --muted2:#9CA3AF;
  --radius:14px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08);
  --f-display:'Space Grotesk',sans-serif;
  --f-body:'Outfit',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--f-body)}
body{display:flex;flex-direction:column;min-height:100vh}

.header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 40px;display:flex;align-items:center;justify-content:space-between;
}
.hl{display:flex;align-items:center;gap:12px}
.logo{height:20px}
.hsep{width:1px;height:16px;background:var(--border)}
.hname{font-family:var(--f-display);font-size:13px;font-weight:600;color:var(--text)}
.hts{font-size:11px;color:var(--muted2);font-weight:500}

.body{flex:1;padding:40px;max-width:1040px;margin:0 auto;width:100%}
.page-title{font-family:var(--f-display);font-size:26px;font-weight:700;color:var(--text);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:32px}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;box-shadow:var(--shadow);cursor:pointer;
  transition:box-shadow .2s,transform .2s;text-decoration:none;color:inherit;display:block;
  position:relative;overflow:hidden;
}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,var(--orange))}

.card-head{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.avatar{
  width:40px;height:40px;border-radius:10px;
  background:var(--cc,var(--orange));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-display);font-size:13px;font-weight:700;color:#fff;
  flex-shrink:0;
}
.card-name{font-family:var(--f-display);font-size:16px;font-weight:700;color:var(--text);line-height:1.2}
.card-period{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2);margin-top:2px}

.card-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.metric{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.metric-val{font-family:var(--f-display);font-size:20px;font-weight:700;color:var(--text);line-height:1}
.metric-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);margin-top:4px}
.metric-val.loading{background:#F0EFED;border-radius:4px;color:transparent;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}

.card-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
  color:var(--muted);background:var(--bg);border:1px solid var(--border);
  border-radius:99px;padding:4px 10px;margin-bottom:16px;
}
.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--cc,var(--orange))}

.card-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:10px;border-radius:8px;
  background:var(--cc,var(--orange));color:#fff;
  font-family:var(--f-display);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  border:none;cursor:pointer;transition:opacity .15s;
}
.card-btn:hover{opacity:.88}
.card-btn svg{width:14px;height:14px}

.footer{
  padding:12px 40px;border-top:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:space-between;
  font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2);
}
.fl{display:flex;align-items:center;gap:8px}
</style>
</head>
<body>

<header class="header">
  <div class="hl">
    <svg class="logo" viewBox="0 0 1164 549" fill="none">
      <path d="M0 330.524V547.706H219.897V437.758L111.306 330.524H0Z" fill="#FE5000"/>
      <path d="M111.306 0V225.327L429.614 547.706H652.225V330.524L331.203 0H111.306Z" fill="#FE5000"/>
      <path d="M622.363 0.678711V226.005L940.671 548.385H1163.28V331.203L842.26 0.678711H622.363Z" fill="#FE5000"/>
    </svg>
    <div class="hsep"></div>
    <div class="hname">Mindor</div>
  </div>
  <span class="hts" id="ts"></span>
</header>

<div class="body">
  <div class="page-title">Relatórios de Clientes</div>
  <div class="page-sub">Selecione um cliente para visualizar o painel de performance</div>

  <div class="grid" id="grid"></div>
</div>

<footer class="footer">
  <div class="fl">
    <svg height="11" viewBox="0 0 1164 549" fill="none">
      <path d="M0 330.524V547.706H219.897V437.758L111.306 330.524H0Z" fill="#FE5000"/>
      <path d="M111.306 0V225.327L429.614 547.706H652.225V330.524L331.203 0H111.306Z" fill="#FE5000"/>
      <path d="M622.363 0.678711V226.005L940.671 548.385H1163.28V331.203L842.26 0.678711H622.363Z" fill="#FE5000"/>
    </svg>
    Mindor · Painel de Relatórios
  </div>
  <span id="ts2"></span>
</footer>

<script>
const CLIENTS = [
  { id:'nm-multimarcas', name:'NM Multimarcas',      initials:'NM', color:'#FE5000', period:'Tráfego e Vendas · 2026', sheetId:'1gZ6AJtYBEvLgYh5poWkUPbJ2gcrejFW3qS8bUme7sjs' },
  { id:'queiroz',        name:'Queiroz',              initials:'QZ', color:'#16A34A', period:'Tráfego e Vendas · 2026', sheetId:'1nU0vWVGu6DtjGLY5lXdfiLiqIMz_nWU6-vv6-S9APNM' },
  { id:'jogador-caro',   name:'Jogador Caro',         initials:'JC', color:'#2563EB', period:'Tráfego e Vendas · 2024', sheetId:'15x9ATXeXetsY8mJv9skPzKQlEqDBPc2-iXKWpjvYD9E' },
  { id:'gg-imports',     name:'GG Imports',           initials:'GG', color:'#7C3AED', period:'Tráfego e Vendas · 2025', sheetId:'1EajO0UX0QvgLLisLhTGMDmnDYUwld5qp_gTH7bbWrBI' },
  { id:'2m',             name:'2M',                   initials:'2M', color:'#0891B2', period:'Tráfego e Vendas · 2026', sheetId:'1zj6jp51hYtLtNoJxuGS0eacszVRXZeOUgGqe5XiJqQo' },
  { id:'bl-multimarcas', name:'BL Multimarcas',       initials:'BL', color:'#D97706', period:'Tráfego e Vendas · 2026', sheetId:'1OgppJhCANv6Nf3A962eAcUNPIkMI65_xpV4AvhvQzJs' },
  { id:'chefao',         name:'Chefão',               initials:'CH', color:'#DB2777', period:'Tráfego e Vendas · 2026', sheetId:'1ftgKL6ffQNM_ArTmYxk4i7hSGGOYl-mad7icGveUVXY' },
  { id:'deck',           name:'Deck',                 initials:'DK', color:'#059669', period:'Tráfego e Vendas · 2026', sheetId:'1v9VlERjS9dqKQGQCdl9R2wxAKwkeiva3W7KuDR3kZmI' },
  { id:'dichava',        name:'Dichava',              initials:'DI', color:'#DC2626', period:'Tráfego e Vendas · 2026', sheetId:'161CVdRMNKyg69CyqQnzPzJM1I2VmoM6hQ5lv5npaX4M' },
  { id:'fv',             name:'FV',                   initials:'FV', color:'#0284C7', period:'Tráfego e Vendas · 2026', sheetId:'1_5_xhDKT2Tn0rSSfvoYGpWrGqgBzqFXi6U5wIGLX6C8' },
  { id:'grow-for-firl',  name:'Grow for Firl',        initials:'GF', color:'#65A30D', period:'Tráfego e Vendas · 2026', sheetId:'1QE6xj6hv4OhnQIMlqhQC2lWpKkR_eTaN98lIKt5Yzuc' },
  { id:'iphones-deyse',  name:'Iphones/Lupas Deyse',  initials:'ID', color:'#9333EA', period:'Tráfego e Vendas · 2026', sheetId:'1jCDlrkFWYLF4KRH4EGsiCojfw2RmzaReUUPhzYopnqU' },
  { id:'mv-imports',     name:'MV Imports',           initials:'MV', color:'#EA580C', period:'Tráfego e Vendas · 2026', sheetId:'1gDrJe2PRQj64-C0DsgMxq4Jjtl_0d5r2WjTIfzn2QNo' },
  { id:'magnata',        name:'Magnata',              initials:'MG', color:'#0D9488', period:'Tráfego e Vendas · 2026', sheetId:'12vexNewtc3Mf7Z5o5hOwN4ge7PyiH8Yv2BHUfkwvSO8' },
  { id:'mundo-iphone',   name:'Mundo iPhone',         initials:'MI', color:'#4F46E5', period:'Tráfego e Vendas · 2026', sheetId:'1Ol8IsHpcBMWo5W4UhBMjpIzFYo5wKMaFvg9lj0-CeAw' },
  { id:'new-imports',    name:'New Imports',          initials:'NI', color:'#B45309', period:'Tráfego e Vendas · 2026', sheetId:'1mjp3F0utbnWaRBBC6cX-j4h-phLvf1Qpq_HTC44CXXQ' },
  { id:'style-store',    name:'Style Store',          initials:'SS', color:'#0F766E', period:'Tráfego e Vendas · 2026', sheetId:'1k_0pH33_pjuvqJh2gvZoquNmduVO-_UYauHdEF-39m4' },
  { id:'theo',           name:'Theo',                 initials:'TH', color:'#1D4ED8', period:'Tráfego e Vendas · 2026', sheetId:'1G69pLmj5I_ck7PEeaoM3-SxuuSIjhbno8cSvXt_yQmo' },
  { id:'zero-grau',      name:'Zero Grau',            initials:'ZG', color:'#166534', period:'Tráfego e Vendas · 2026', sheetId:'10RKxzkPyMjCgjq58CU-sMsKGvPISbhcptpsGbkvlZMw' },
];

function parseCSV(text){
  return text.trim().split('\n').map(line=>{
    const f=[];let q=false,s='';
    for(const c of line){if(c==='"'){q=!q;continue}if(c===','&&!q){f.push(s.trim());s='';continue}s+=c}
    f.push(s.trim());return f;
  });
}
function parseBRL(s){if(!s)return 0;return parseFloat(s.replace('R$','').replace(/\./g,'').replace(',','.').trim())||0}
function fmtBRL(v){if(!v)return'—';const n=Math.round(v);return n>=1000?'R$'+Math.round(n/1000)+'k':'R$'+n.toLocaleString('pt-BR')}
function fmtNum(v){if(!v)return'—';return v>=1000?(v/1000).toFixed(1)+'k':String(v)}

async function getCardData(client){
  try{
    const res=await fetch(`https://docs.google.com/spreadsheets/d/${client.sheetId}/gviz/tq?tqx=out:csv&sheet=RESUMO`);
    const text=await res.text();
    const rows=parseCSV(text);
    const isA=(rows[0][0]||'').toLowerCase()==='aba';
    if(isA){
      const months=rows.slice(1).filter(r=>r[0]&&r[0]!=='NÃO MEXER'&&r[0].trim()&&parseInt(r[2])>0);
      if(!months.length)return null;
      const last=months[months.length-1];
      return{vendas:parseInt(last[2])||0,fat:parseBRL(last[5]),label:last[0]+' '+last[1].slice(-4),tipo:'mensal'};
    }else{
      const total=rows.slice(1).find(r=>(r[1]||'').trim()==='TOTAL');
      if(!total)return null;
      return{vendas:parseInt(total[2])||0,fat:parseBRL(total[7]),label:'Acumulado',tipo:'anual'};
    }
  }catch{return null}
}

function buildCard(client, data){
  const vendas = data ? fmtNum(data.vendas) : '—';
  const fat    = data ? fmtBRL(data.fat) : '—';
  const label  = data ? data.label : '—';
  const tipo   = data ? (data.tipo==='anual'?'Acumulado anual':'Último mês') : '';

  const card = document.createElement('a');
  card.href = `dashboard.html?client=${client.id}`;
  card.className = 'card';
  card.style.setProperty('--cc', client.color);
  card.innerHTML = `
    <div class="card-head">
      <div class="avatar" style="background:${client.color}">${client.initials}</div>
      <div>
        <div class="card-name">${client.name}</div>
        <div class="card-period">${client.period}</div>
      </div>
    </div>
    <div class="card-metrics">
      <div class="metric">
        <div class="metric-val">${vendas}</div>
        <div class="metric-label">Vendas</div>
      </div>
      <div class="metric">
        <div class="metric-val">${fat}</div>
        <div class="metric-label">Faturamento</div>
      </div>
    </div>
    <div class="card-badge"><div class="badge-dot"></div>${tipo ? tipo+' · '+label : 'Carregando...'}</div>
    <button class="card-btn" style="background:${client.color}">
      Ver relatório
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </button>
  `;
  return card;
}

async function init(){
  const grid = document.getElementById('grid');
  // render skeleton cards first
  CLIENTS.forEach(c=>{
    const card=document.createElement('a');
    card.href=`dashboard.html?client=${c.id}`;
    card.className='card';
    card.style.setProperty('--cc',c.color);
    card.id=`card-${c.id}`;
    card.innerHTML=`
      <div class="card-head">
        <div class="avatar" style="background:${c.color}">${c.initials}</div>
        <div>
          <div class="card-name">${c.name}</div>
          <div class="card-period">${c.period}</div>
        </div>
      </div>
      <div class="card-metrics">
        <div class="metric"><div class="metric-val loading">000</div><div class="metric-label">Vendas</div></div>
        <div class="metric"><div class="metric-val loading">R$00k</div><div class="metric-label">Faturamento</div></div>
      </div>
      <div class="card-badge"><div class="badge-dot"></div>Carregando...</div>
      <button class="card-btn" style="background:${c.color}">
        Ver relatório
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
    `;
    grid.appendChild(card);
  });

  // fetch all in parallel then replace
  const results = await Promise.all(CLIENTS.map(c=>getCardData(c)));
  CLIENTS.forEach((c,i)=>{
    const el=document.getElementById(`card-${c.id}`);
    if(el&&results[i]){
      el.replaceWith(buildCard(c,results[i]));
    }
  });
}

function tick(){
  const n=new Date();
  const s=n.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})+' · '+n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('ts').textContent=s;
  document.getElementById('ts2').textContent=s;
}
tick();setInterval(tick,60000);
init();
</script>
</body>
</html>
